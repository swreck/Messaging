<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0088ff"/>
      <stop offset="50%" stop-color="#0066dd"/>
      <stop offset="100%" stop-color="#003da8"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="0.35" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#44aaff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0066dd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottomDark" cx="0.6" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#001a44" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#003da8" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay" result="blended"/>
      <feComponentTransfer in="blended"><feFuncA type="linear" slope="1"/></feComponentTransfer>
    </filter>
    <filter id="bubbleShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur stdDeviation="12" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bubbleMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e8f0"/>
    </linearGradient>
    <linearGradient id="bubbleShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0066dd"/>
      <stop offset="100%" stop-color="#003399"/>
    </linearGradient>
  </defs>

  <clipPath id="iconClip"><rect width="512" height="512" rx="112"/></clipPath>

  <g clip-path="url(#iconClip)">
    <!-- Layered background -->
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="url(#topGlow)"/>
    <rect width="512" height="512" fill="url(#bottomDark)"/>
    <rect width="512" height="512" fill="url(#bg)" opacity="0.03" filter="url(#noise)"/>

    <!-- Diagonal light streaks -->
    <line x1="0" y1="512" x2="200" y2="0" stroke="white" stroke-width="80" opacity="0.03"/>
    <line x1="100" y1="512" x2="350" y2="0" stroke="white" stroke-width="50" opacity="0.025"/>
    <line x1="300" y1="512" x2="512" y2="100" stroke="white" stroke-width="40" opacity="0.02"/>

    <!-- Speed lines -->
    <g stroke="white" stroke-linecap="round" fill="none">
      <path d="M30 180 Q70 177 120 181" stroke-width="4" opacity="0.18"/>
      <path d="M50 220 Q85 216 130 221" stroke-width="3" opacity="0.14"/>
      <path d="M25 260 Q70 256 115 261" stroke-width="3.5" opacity="0.16"/>
      <path d="M60 298 Q90 294 128 299" stroke-width="2.5" opacity="0.12"/>
    </g>

    <!-- Speech bubble — single continuous path, no rect+triangle overlap -->
    <g filter="url(#bubbleShadow)">
      <g transform="translate(270 230) rotate(1)">
        <!-- Single smooth bubble shape with integrated tail -->
        <path d="M-180 -130
                 Q-180 -130 -130 -130
                 L130 -130
                 Q180 -130 180 -80
                 L180 70
                 Q180 115 130 115
                 L-30 115
                 L-120 175
                 L-70 115
                 L-130 115
                 Q-180 115 -180 70
                 Z"
          fill="url(#bubbleMain)"/>
        <!-- Top shine clipped to bubble -->
        <clipPath id="bubbleClip">
          <path d="M-180 -130 Q-180 -130 -130 -130 L130 -130 Q180 -130 180 -80 L180 70 Q180 115 130 115 L-30 115 L-120 175 L-70 115 L-130 115 Q-180 115 -180 70 Z"/>
        </clipPath>
        <g clip-path="url(#bubbleClip)">
          <rect x="-180" y="-130" width="360" height="130" fill="url(#bubbleShine)"/>
          <!-- Bottom inner shadow -->
          <rect x="-170" y="80" width="340" height="35" rx="15" fill="#c0cad8" opacity="0.25"/>
        </g>
        <!-- Subtle outline -->
        <path d="M-180 -130 Q-180 -130 -130 -130 L130 -130 Q180 -130 180 -80 L180 70 Q180 115 130 115 L-30 115 L-120 175 L-70 115 L-130 115 Q-180 115 -180 70 Z"
          fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
      </g>
    </g>

    <!-- M! text — large, fills the bubble -->
    <g transform="translate(272 222)">
      <!-- Shadow -->
      <text x="0" y="3" text-anchor="middle" dominant-baseline="central"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="210" font-weight="800" font-style="italic" fill="#b0c4dd" style="letter-spacing: -4px;">M!</text>
      <!-- Main -->
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="210" font-weight="800" font-style="italic" fill="url(#mGrad)" style="letter-spacing: -4px;">M!</text>
    </g>

    <!-- Forward arrows -->
    <g transform="translate(435 225)" opacity="0.35">
      <path d="M0 0 L22 0 L15 -7 M22 0 L15 7" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <g transform="translate(448 255)" opacity="0.2">
      <path d="M0 0 L16 0 L11 -5 M16 0 L11 5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
</svg>
